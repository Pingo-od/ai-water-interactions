<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voice Input Bubble</title>
    <link rel="stylesheet" href="../dist/ai-water-interactions.css" />
    <style>
      :root {
        font-family: "SF Pro Display", "PingFang SC", "Noto Sans SC", Arial, sans-serif;
        color: #17202a;
        background:
          radial-gradient(circle at 18% 16%, rgba(91, 150, 255, 0.14), transparent 26%),
          radial-gradient(circle at 82% 72%, rgba(255, 169, 93, 0.1), transparent 28%),
          #f7f9fb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
      }

      main {
        width: min(780px, calc(100% - 48px));
        display: grid;
        gap: 18px;
        text-align: center;
        padding: 32px;
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        font-size: 30px;
        letter-spacing: 0;
      }

      p {
        color: #5f6f7c;
        font-size: 18px;
        line-height: 1.6;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
        margin-top: 12px;
      }

      button {
        border: 1px solid rgba(37, 107, 181, 0.22);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.78);
        box-shadow: 0 10px 28px rgba(42, 95, 162, 0.12);
        color: #1f67c8;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        padding: 10px 18px;
      }

      .home-link {
        position: fixed;
        left: 24px;
        top: 24px;
        z-index: 20;
        border: 1px solid rgba(37, 107, 181, 0.18);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: 0 10px 28px rgba(42, 95, 162, 0.1);
        color: #1f67c8;
        font-size: 14px;
        font-weight: 800;
        padding: 9px 14px;
        text-decoration: none;
      }

      .tip {
        color: #7a8897;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <a class="home-link" href="../index.html">返回首页</a>
    <main>
      <h1>VoiceInputBubble 语音输入</h1>
      <p>先左右小幅晃动鼠标激活 AI 光标，再点击开始语音输入。</p>
      <p>语音胶囊会和 AI 光标联动，显示音波波动并把识别结果转成文字。</p>
      <p class="tip">如果当前浏览器不支持语音识别，可使用模拟转写按钮验证组件状态。</p>
      <div class="actions">
        <button type="button" data-start>开始语音输入</button>
        <button type="button" data-simulate>模拟转写：合并单元格</button>
        <button type="button" data-stop>停止/隐藏</button>
      </div>
    </main>

    <script src="../dist/ai-water-interactions.js"></script>
    <script>
      const bubble = AIWater.createVoiceInputBubble({
        text: "合并单元格",
        listeningText: "正在聆听...",
        cursorAssetUrl: "../assets/ai-cursor.svg",
        onTranscript(text) {
          console.log("transcript:", text);
        }
      });

      const trigger = AIWater.createCursorTrigger({
        shakeThreshold: 2,
        autoHide: false,
        cursorOptions: {
          assetUrl: "../assets/ai-cursor.svg"
        },
        onActivate({ point }) {
          trigger.cursor.layer.classList.remove("is-visible");
          bubble.show(point, "合并单元格");
        },
        onDismiss() {
          bubble.hide();
        }
      });

      let lastPoint = {
        x: window.innerWidth * 0.5,
        y: window.innerHeight * 0.5
      };

      window.addEventListener("pointermove", event => {
        lastPoint = { x: event.clientX, y: event.clientY };
        if (trigger.active && bubble.visible) {
          bubble.moveTo(event.clientX, event.clientY);
        }
      });

      document.querySelector("[data-start]").addEventListener("click", () => {
        trigger.cursor.show(lastPoint);
        trigger.cursor.layer.classList.remove("is-visible");
        trigger.active = true;
        bubble.startListening(lastPoint);
      });

      document.querySelector("[data-simulate]").addEventListener("click", () => {
        trigger.cursor.show(lastPoint);
        trigger.cursor.layer.classList.remove("is-visible");
        trigger.active = true;
        bubble.show(lastPoint, "");
        bubble.layer.classList.add("is-listening");
        bubble.typeTranscript("合并单元格", {
          interval: 130,
          onComplete() {
            window.setTimeout(() => {
              bubble.layer.classList.remove("is-listening");
            }, 360);
          }
        });
      });

      document.querySelector("[data-stop]").addEventListener("click", () => {
        trigger.dismiss();
      });
    </script>
  </body>
</html>
