<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text Selection Generation</title>
    <link rel="stylesheet" href="../dist/ai-water-interactions.css" />
    <style>
      :root {
        font-family: "SF Pro Display", "PingFang SC", "Noto Sans SC", Arial, sans-serif;
        color: #17202a;
        background:
          radial-gradient(circle at 18% 14%, rgba(70, 192, 255, 0.12), transparent 28%),
          radial-gradient(circle at 88% 82%, rgba(121, 138, 255, 0.1), transparent 30%),
          #f7f9fb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
      }

      .home-link {
        position: fixed;
        left: 24px;
        top: 24px;
        border: 1px solid rgba(37, 107, 181, 0.18);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: 0 10px 28px rgba(42, 95, 162, 0.1);
        color: #1f67c8;
        font-size: 14px;
        font-weight: 800;
        padding: 9px 14px;
        text-decoration: none;
      }

      main {
        width: min(780px, calc(100% - 48px));
        display: grid;
        gap: 18px;
        text-align: center;
        padding: 32px;
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        font-size: 30px;
        letter-spacing: 0;
      }

      p {
        color: #5f6f7c;
        font-size: 18px;
        line-height: 1.6;
      }

      .mock-document {
        margin-top: 16px;
        display: grid;
        gap: 14px;
        border: 1px solid rgba(37, 107, 181, 0.14);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.78);
        box-shadow: 0 18px 46px rgba(42, 95, 162, 0.1);
        padding: 28px;
        text-align: left;
      }

      .mock-line {
        height: 14px;
        border-radius: 999px;
        background: rgba(37, 107, 181, 0.12);
      }

      .mock-line:nth-child(1) {
        width: 72%;
      }

      .mock-line:nth-child(2) {
        width: 94%;
      }

      .mock-line:nth-child(3) {
        width: 68%;
      }

      .selection-hint {
        width: 46%;
        height: 28px;
        border-radius: 999px;
        background: linear-gradient(90deg, rgba(70, 192, 255, 0.28), rgba(121, 138, 255, 0.18));
        box-shadow: 0 0 24px rgba(70, 192, 255, 0.18);
      }
    </style>
  </head>
  <body>
    <a class="home-link" href="../index.html">返回首页</a>
    <main>
      <h1>TextSelectionGeneration 划词生成</h1>
      <p>这是 06 组件的演示入口占位页。后续会接入按住 AI 光标划选文字、水相选区和生成中状态。</p>
      <section class="mock-document" aria-label="文本划选示意">
        <span class="mock-line"></span>
        <span class="selection-hint"></span>
        <span class="mock-line"></span>
        <span class="mock-line"></span>
      </section>
    </main>
  </body>
</html>
