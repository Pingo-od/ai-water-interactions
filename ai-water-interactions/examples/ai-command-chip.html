<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Command Chip</title>
    <link rel="stylesheet" href="../dist/ai-water-interactions.css" />
    <style>
      :root {
        font-family: "SF Pro Display", "PingFang SC", "Noto Sans SC", Arial, sans-serif;
        color: #17202a;
        background:
          radial-gradient(circle at 18% 16%, rgba(91, 150, 255, 0.14), transparent 26%),
          radial-gradient(circle at 82% 72%, rgba(255, 169, 93, 0.1), transparent 28%),
          #f7f9fb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
      }

      main {
        width: min(760px, calc(100% - 48px));
        display: grid;
        gap: 18px;
        text-align: center;
        padding: 32px;
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        font-size: 30px;
        letter-spacing: 0;
      }

      p {
        color: #5f6f7c;
        font-size: 18px;
        line-height: 1.6;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
        margin-top: 12px;
      }

      button {
        border: 1px solid rgba(37, 107, 181, 0.22);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.78);
        box-shadow: 0 10px 28px rgba(42, 95, 162, 0.12);
        color: #1f67c8;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        padding: 10px 18px;
      }

      .home-link {
        position: fixed;
        left: 24px;
        top: 24px;
        z-index: 20;
        border: 1px solid rgba(37, 107, 181, 0.18);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: 0 10px 28px rgba(42, 95, 162, 0.1);
        color: #1f67c8;
        font-size: 14px;
        font-weight: 800;
        padding: 9px 14px;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <a class="home-link" href="../index.html">返回首页</a>
    <main>
      <h1>AICommandChip 指令胶囊</h1>
      <p>左右小幅晃动鼠标，切换 AI 光标并在光标旁展开指令胶囊。</p>
      <p>这个组件后续可展示指令文案、语音输入文本或生成状态。</p>
      <div class="actions">
        <button type="button" data-text="Make this more human">Make this more human</button>
        <button type="button" data-text="润色这段内容">润色这段内容</button>
        <button type="button" data-dismiss>恢复系统光标</button>
      </div>
    </main>

    <script src="../dist/ai-water-interactions.js"></script>
    <script>
      const chip = AIWater.createCommandChip({
        assetUrl: "../assets/ai-cursor-command-chip.svg",
        width: 365,
        height: 198,
        offsetX: -58,
        offsetY: -76
      });

      const trigger = AIWater.createCursorTrigger({
        shakeThreshold: 2,
        autoHide: false,
        cursorOptions: {
          assetUrl: "../assets/ai-cursor.svg"
        },
        onActivate({ point }) {
          trigger.cursor.layer.classList.remove("is-visible");
          chip.show(point);
        },
        onDismiss() {
          chip.hide();
        }
      });

      window.addEventListener("pointermove", event => {
        if (trigger.active) {
          chip.moveTo(event.clientX, event.clientY);
        }
      });

      document.querySelectorAll("[data-text]").forEach(button => {
        button.addEventListener("click", event => {
          const text = event.currentTarget.dataset.text;
          chip.setText(text);
          if (trigger.active) {
            chip.show(null, text);
          }
        });
      });

      document.querySelector("[data-dismiss]").addEventListener("click", () => {
        trigger.dismiss();
      });
    </script>
  </body>
</html>
