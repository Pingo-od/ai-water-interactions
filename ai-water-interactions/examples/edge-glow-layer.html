<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edge Glow Layer</title>
    <link rel="stylesheet" href="../dist/ai-water-interactions.css?v=edge-glow-figma-5" />
    <style>
      :root {
        color-scheme: light;
        font-family: "SF Pro Display", "PingFang SC", "Noto Sans SC", Arial, sans-serif;
        --page-text: #17202a;
        --page-muted: rgba(45, 61, 78, 0.68);
        --page-line: rgba(33, 72, 112, 0.12);
        --panel-bg: rgba(255, 255, 255, 0.78);
        --control-bg: rgba(255, 255, 255, 0.82);
        --control-text: #1f67c8;
        background: #f7f9fb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        color: var(--page-text);
        overflow: hidden;
        transition: background 260ms ease, color 260ms ease;
      }

      body[data-bg="light"] {
        background:
          radial-gradient(circle at 18% 12%, rgba(70, 192, 255, 0.16), transparent 26%),
          radial-gradient(circle at 86% 86%, rgba(121, 138, 255, 0.12), transparent 30%),
          linear-gradient(180deg, #fbfdff 0%, #eef4f8 100%);
      }

      body[data-bg="dark"] {
        --page-text: rgba(255, 255, 255, 0.88);
        --page-muted: rgba(255, 255, 255, 0.62);
        --page-line: rgba(255, 255, 255, 0.12);
        --panel-bg: rgba(8, 12, 18, 0.52);
        --control-bg: rgba(12, 16, 22, 0.58);
        --control-text: rgba(255, 255, 255, 0.86);
        background:
          radial-gradient(circle at 14% 18%, rgba(70, 136, 255, 0.18), transparent 28%),
          radial-gradient(circle at 82% 22%, rgba(255, 37, 99, 0.14), transparent 24%),
          radial-gradient(circle at 82% 86%, rgba(35, 212, 123, 0.1), transparent 28%),
          #05070b;
      }

      body[data-bg="document"] {
        background:
          linear-gradient(rgba(33, 72, 112, 0.06) 1px, transparent 1px) 0 0 / 72px 72px,
          linear-gradient(90deg, rgba(33, 72, 112, 0.06) 1px, transparent 1px) 0 0 / 72px 72px,
          linear-gradient(135deg, #f6f8fb 0%, #dfe6ee 100%);
      }

      .home-link,
      button {
        border: 1px solid var(--page-line);
        border-radius: 999px;
        background: var(--control-bg);
        box-shadow: 0 10px 28px rgba(42, 95, 162, 0.1);
        color: var(--control-text);
        font: inherit;
        font-size: 14px;
        font-weight: 800;
        padding: 9px 14px;
        text-decoration: none;
        backdrop-filter: blur(18px);
      }

      button {
        cursor: pointer;
      }

      .home-link {
        position: fixed;
        left: 24px;
        top: 24px;
        z-index: 20;
      }

      main {
        position: relative;
        z-index: 1;
        width: min(920px, calc(100% - 48px));
        min-height: 100vh;
        margin: 0 auto;
        display: grid;
        align-content: center;
        gap: 28px;
        padding: 96px 0;
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        font-size: clamp(32px, 4vw, 52px);
        line-height: 1.08;
        letter-spacing: 0;
      }

      p {
        max-width: 680px;
        color: var(--page-muted);
        font-size: 18px;
        line-height: 1.68;
      }

      .mock-panel {
        display: grid;
        gap: 18px;
        max-width: 720px;
        padding: 28px;
        border: 1px solid var(--page-line);
        border-radius: 8px;
        background: var(--panel-bg);
        backdrop-filter: blur(18px);
      }

      .mock-lines {
        display: grid;
        gap: 12px;
      }

      .mock-lines span {
        height: 12px;
        border-radius: 999px;
        background: var(--page-line);
      }

      .mock-lines span:nth-child(1) {
        width: 78%;
      }

      .mock-lines span:nth-child(2) {
        width: 92%;
      }

      .mock-lines span:nth-child(3) {
        width: 64%;
      }

      .actions {
        position: fixed;
        left: 50%;
        bottom: 32px;
        z-index: 20;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
        transform: translateX(-50%);
      }

      .backgrounds {
        position: fixed;
        right: 24px;
        top: 24px;
        z-index: 20;
        display: flex;
        gap: 8px;
      }

      @media (max-width: 720px) {
        .backgrounds {
          left: 24px;
          right: auto;
          top: 76px;
        }

        main {
          padding-top: 150px;
        }
      }
    </style>
  </head>
  <body data-bg="light">
    <a class="home-link" href="../index.html">返回首页</a>
    <div class="backgrounds" aria-label="背景切换">
      <button type="button" data-bg="light">浅色</button>
      <button type="button" data-bg="dark">深色</button>
      <button type="button" data-bg="document">文档</button>
    </div>
    <main>
      <h1>EdgeGlowLayer 边缘光晕</h1>
      <p>全屏贴边覆盖层，用柔和的彩色呼吸光效表达 AI 水相场域已激活。组件不拦截鼠标，可叠加在任意页面之上。</p>
      <section class="mock-panel" aria-label="页面内容示例">
        <p>这里模拟协作同学已经完成的页面 UI。边缘光晕会紧贴浏览器窗口四周，并跟随屏幕比例自适应。</p>
        <div class="mock-lines" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </section>
    </main>
    <div class="actions">
      <button type="button" data-start>显示光晕</button>
      <button type="button" data-stop>隐藏光晕</button>
      <button type="button" data-soft>柔和一点</button>
      <button type="button" data-strong>明显一点</button>
    </div>

    <script src="../dist/ai-water-interactions.js?v=edge-glow-figma-5"></script>
    <script>
      const edgeGlow = AIWater.createEdgeGlowLayer({
        autoPlay: true,
        assetUrl: "../assets/edge-glow-pad-edge-only.png",
        thickness: 42,
        blur: 32,
        opacity: 0.82,
        intensity: 1
      });

      document.querySelector("[data-start]").addEventListener("click", () => {
        edgeGlow.start();
      });

      document.querySelector("[data-stop]").addEventListener("click", () => {
        edgeGlow.stop();
      });

      document.querySelector("[data-soft]").addEventListener("click", () => {
        edgeGlow.setOptions({ thickness: 34, blur: 34, opacity: 0.64, intensity: 0.78 }).start();
      });

      document.querySelector("[data-strong]").addEventListener("click", () => {
        edgeGlow.setOptions({ thickness: 52, blur: 38, opacity: 0.9, intensity: 1.12 }).start();
      });

      document.querySelectorAll("[data-bg]").forEach(button => {
        button.addEventListener("click", () => {
          document.body.dataset.bg = button.dataset.bg;
        });
      });
    </script>
  </body>
</html>
